services:
  - type: web
    name: api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install  && npm run build
    startCommand: npm run start:prod -w ./apps/api
    preDeployCommand: npx prisma migrate deploy && npx prisma db seed
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false  # set in Dashboard or via render CLI
      - key: DIRECT_URL
        sync: false  # set in Dashboard or via render CLI
      - key: VITE_AUTH0_ISSUER_URL
        sync: false  # e.g. https://your-tenant.auth0.com/
      - key: VITE_AUTH0_AUDIENCE
        sync: false  # your API identifier